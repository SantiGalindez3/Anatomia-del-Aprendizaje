<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Admin · Anatomía del Aprendizaje</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .login-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 12px var(--color-shadow);
      max-width: 400px;
      margin: 60px auto;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--color-primary);
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 16px;
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #2d6b4f;
    }
    .login-error {
      color: #b33c4a;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .admin-panel {
      display: none;
    }
    .admin-panel h2 {
      color: var(--color-primary);
      margin-bottom: 20px;
    }
    .admin-panel .form-group {
      margin-bottom: 15px;
    }
    .admin-panel label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .admin-panel input,
    .admin-panel textarea,
    .admin-panel select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .admin-panel .btn-submit {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-panel .btn-submit:hover {
      background: #2d6b4f;
    }
    .admin-panel .btn-danger {
      background: #b33c4a;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-panel .btn-danger:hover {
      background: #8a2e3a;
    }
    .admin-panel .article-item {
      background: var(--color-bg);
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--color-border);
    }
    .admin-panel .article-item .actions {
      display: flex;
      gap: 8px;
    }
    .admin-panel .article-item .actions button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .admin-panel .article-item .actions .btn-edit {
      background: #4a90d9;
      color: white;
    }
    .admin-panel .article-item .actions .btn-edit:hover {
      background: #357abd;
    }
    .admin-panel .article-item .actions .btn-delete {
      background: #b33c4a;
      color: white;
    }
    .admin-panel .article-item .actions .btn-delete:hover {
      background: #8a2e3a;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .admin-header .btn-logout {
      background: var(--color-border);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-header .btn-logout:hover {
      background: #c8d3de;
    }
    .edit-form {
      background: var(--color-bg);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      display: none;
      border: 1px solid var(--color-border);
    }
    .edit-form .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .loading-indicator {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
    }
    .form-container {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .edit-form .form-row {
        grid-template-columns: 1fr;
      }
      .admin-panel .article-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .login-box {
        margin: 30px 20px;
        padding: 30px 20px;
      }
    }
    .notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--color-primary);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      font-weight: 500;
      max-width: 90%;
    }
    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }
    [data-theme="dark"] .notification {
      background: var(--color-secondary);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-brand">
        <span class="brand-icon">🔐</span>
        <span class="brand-name">Panel de Administración</span>
      </div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">← Volver al blog</a></li>
      </ul>
    </div>
  </nav>

  <div class="admin-container">
    <!-- Login -->
    <div id="loginBox" class="login-box">
      <h2>🔐 Acceso Administrativo</h2>
      <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 20px;">
        Ingresa la contraseña para gestionar el blog
      </p>
      <input type="password" id="passwordInput" placeholder="Contraseña" autofocus>
      <button onclick="verificarPassword()">Ingresar</button>
      <div id="loginError" class="login-error">❌ Contraseña incorrecta</div>
    </div>

    <!-- Panel de Administración -->
    <div id="adminPanel" class="admin-panel">
      <div class="admin-header">
        <h2>📝 Gestión de Artículos</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <span id="syncStatus" style="font-size: 0.85rem; color: var(--color-text-muted); display: flex; align-items: center;">
            💾 Sincronizado con GitHub
          </span>
          <button class="btn-logout" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
        </div>
      </div>

      <!-- Formulario para nuevo artículo -->
      <div class="form-container">
        <h3>✏️ Publicar nuevo artículo</h3>
        <form id="adminForm">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="adminTitle" placeholder="Título del artículo" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="adminSummary" rows="3" placeholder="Resumen del artículo" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="adminCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="adminReadTime" value="5" min="1" max="30">
            </div>
          </div>
          <button type="submit" class="btn-submit">📤 Publicar artículo</button>
        </form>
      </div>

      <!-- Formulario de edición (oculto) -->
      <div id="editForm" class="edit-form">
        <h3>✏️ Editar artículo</h3>
        <form id="editArticleForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="editTitle" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="editSummary" rows="3" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="editCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="editReadTime" min="1" max="30">
            </div>
          </div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="btn-submit">💾 Guardar cambios</button>
            <button type="button" onclick="cancelarEdicion()" style="background: var(--color-border); border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer;">❌ Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Lista de artículos -->
      <h3 style="margin-top: 30px;">📋 Artículos publicados</h3>
      <div id="articleList">
        <div class="loading-indicator">⏳ Cargando artículos...</div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const ADMIN_PASSWORD = "medicina2026";
    
    // ¡CAMBIAR POR TUS DATOS!
    const GITHUB_USER = "SantiGalindez3";
    const GITHUB_REPO = "Anatomia-del-Aprendizaje";
    const GITHUB_TOKEN = "";  // <--- ¡PON TU TOKEN AQUÍ!
    const ARTICULOS_FILE = "articulos.json";

    let articulos = [];
    let editingId = null;

    // ============================================================
    // FUNCIONES DE GITHUB
    // ============================================================

    async function cargarArticulosDesdeGitHub() {
      try {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${ARTICULOS_FILE}`;
        const response = await fetch(url);
        
        if (response.status === 404) {
          // Crear archivo por defecto
          articulos = [
            {
              id: 1,
              titulo: "Bienvenido a Anatomía del Aprendizaje",
              resumen: "Este es tu blog médico. Desde el panel de administración podrás crear, editar y eliminar artículos.",
              categoria: "Clínica",
              fecha: new Date().toISOString().split('T')[0],
              tiempoLectura: 2,
              destacado: true
            }
          ];
          await guardarArticulosEnGitHub();
          renderizarLista();
          return;
        }

        const data = await response.json();
        const contenido = atob(data.content);
        articulos = JSON.parse(contenido);
        renderizarLista();
        document.getElementById('syncStatus').textContent = '✅ Sincronizado con GitHub';
      } catch (error) {
        console.error('Error al cargar:', error);
        document.getElementById('articleList').innerHTML = '<p style="color: #b33c4a;">❌ Error al cargar artículos. Verifica tu token de GitHub.</p>';
      }
    }

    async function guardarArticulosEnGitHub() {
      try {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${ARTICULOS_FILE}`;
        
        // Obtener SHA actual
        const response = await fetch(url);
        let sha = null;
        if (response.ok) {
          const data = await response.json();
          sha = data.sha;
        }

        const contenido = JSON.stringify(articulos, null, 2);
        const contenidoBase64 = btoa(unescape(encodeURIComponent(contenido)));

        const body = {
          message: "Actualización de artículos desde el panel de admin",
          content: contenidoBase64,
          branch: "main"
        };

        if (sha) {
          body.sha = sha;
        }

        const putResponse = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        if (putResponse.ok) {
          document.getElementById('syncStatus').textContent = '✅ Guardado en GitHub';
          mostrarNotificacion('✅ Cambios guardados en GitHub');
          return true;
        } else {
          const errorText = await putResponse.text();
          console.error('Error al guardar:', errorText);
          document.getElementById('syncStatus').textContent = '❌ Error al guardar';
          mostrarNotificacion('❌ Error al guardar en GitHub. Verifica tu token.');
          return false;
        }
      } catch (error) {
        console.error('Error al guardar:', error);
        mostrarNotificacion('❌ Error de conexión');
        return false;
      }
    }

    // ============================================================
    // FUNCIONES DEL ADMIN
    // ============================================================

    function verificarPassword() {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('loginError');
      
      if (input.value === ADMIN_PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        error.style.display = 'none';
        cargarArticulosDesdeGitHub();
      } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
      }
    }

    function cerrarSesion() {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    function renderizarLista() {
      const list = document.getElementById('articleList');
      if (!articulos || articulos.length === 0) {
        list.innerHTML = '<p style="color: var(--color-text-muted);">No hay artículos publicados.</p>';
        return;
      }

      let html = '';
      articulos.forEach(a => {
        html += `
          <div class="article-item">
            <div>
              <strong>${a.titulo}</strong>
              <br>
              <span style="font-size: 0.85rem; color: var(--color-text-muted);">
                ${a.categoria} · ${a.fecha} · ${a.tiempoLectura} min
              </span>
            </div>
            <div class="actions">
              <button class="btn-edit" onclick="editarArticulo(${a.id})">✏️</button>
              <button class="btn-delete" onclick="eliminarArticulo(${a.id})">🗑️</button>
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    async function eliminarArticulo(id) {
      if (confirm('¿Estás seguro de eliminar este artículo?')) {
        articulos = articulos.filter(a => a.id !== id);
        await guardarArticulosEnGitHub();
        renderizarLista();
        mostrarNotificacion('🗑️ Artículo eliminado');
      }
    }

    function editarArticulo(id) {
      const articulo = articulos.find(a => a.id === id);
      if (!articulo) return;

      document.getElementById('editId').value = articulo.id;
      document.getElementById('editTitle').value = articulo.titulo;
      document.getElementById('editSummary').value = articulo.resumen;
      document.getElementById('editCategory').value = articulo.categoria;
      document.getElementById('editReadTime').value = articulo.tiempoLectura;
      
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('editForm').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelarEdicion() {
      document.getElementById('editForm').style.display = 'none';
    }

    function mostrarNotificacion(mensaje) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = mensaje;
      document.body.appendChild(notif);
      setTimeout(() => notif.classList.add('show'), 10);
      setTimeout(() => {
        notif.classList.remove('show');
        setTimeout(() => notif.remove(), 300);
      }, 3000);
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verificarPassword();
    });

    // Nuevo artículo
    document.getElementById('adminForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const titulo = document.getElementById('adminTitle').value.trim();
      const resumen = document.getElementById('adminSummary').value.trim();
      const categoria = document.getElementById('adminCategory').value;
      const tiempoLectura = parseInt(document.getElementById('adminReadTime').value);

      if (!titulo || !resumen) {
        alert('Completa todos los campos obligatorios.');
        return;
      }

      const nuevo = {
        id: Date.now(),
        titulo,
        resumen,
        categoria,
        fecha: new Date().toISOString().split('T')[0],
        tiempoLectura,
        destacado: false
      };

      articulos.push(nuevo);
      const guardado = await guardarArticulosEnGitHub();
      if (guardado) {
        renderizarLista();
        this.reset();
        mostrarNotificacion('✅ Artículo publicado correctamente');
      }
    });

    // Editar artículo
    document.getElementById('editArticleForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const id = parseInt(document.getElementById('editId').value);
      const titulo = document.getElementById('editTitle').value.trim();
      const resumen = document.getElementById('editSummary').value.trim();
      const categoria = document.getElementById('editCategory').value;
      const tiempoLectura = parseInt(document.getElementById('editReadTime').value);

      if (!titulo || !resumen) {
        alert('Completa todos los campos.');
        return;
      }

      const index = articulos.findIndex(a => a.id === id);
      if (index !== -1) {
        articulos[index] = { ...articulos[index], titulo, resumen, categoria, tiempoLectura };
        const guardado = await guardarArticulosEnGitHub();
        if (guardado) {
          renderizarLista();
          document.getElementById('editForm').style.display = 'none';
          mostrarNotificacion('✅ Artículo actualizado');
        }
      }
    });

    // Tema oscuro
    let currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================

    console.log('🔐 Panel de administración cargado');
    console.log(`👤 Usuario: ${GITHUB_USER}/${GITHUB_REPO}`);
    if (GITHUB_TOKEN === "TU_TOKEN_DE_GITHUB") {
      console.warn('⚠️ ¡No olvides configurar tu GITHUB_TOKEN!');
    }
  </script>

</body>
</html>
