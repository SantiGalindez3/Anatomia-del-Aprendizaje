<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Lado C</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Gestión de Contenido</h1>
        <button id="logout-btn" style="display:none;">Cerrar Sesión</button>
    </header>

    <main class="admin-container">
        <!-- Sección de Login -->
        <section id="login-section">
            <h2>Acceso de Administrador</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Contraseña de acceso" required>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </section>

        <!-- Panel Principal (Oculto hasta autenticarse) -->
        <section id="dashboard-section" style="display:none;">
            <h2>Nuevo Artículo / Nota</h2>
            <form id="article-form">
                <input type="text" id="art-title" placeholder="Título del artículo" required>
                <textarea id="art-summary" placeholder="Breve resumen o bajada" required></textarea>
                <textarea id="art-content" placeholder="Contenido completo en formato HTML o texto" rows="10" required></textarea>
                <button type="submit" class="btn">Guardar y Publicar</button>
            </form>

            <div class="export-box">
                <h3>Sincronización Pública</h3>
                <p>Para que los cambios sean visibles en la web pública, descarga el archivo actualizado y súbelo a tu repositorio, o conéctalo a tu almacenamiento.</p>
                <button id="download-json" class="btn secondary">Descargar articulos.json</button>
            </div>
        </section>
    </main>

    <script>
        const CORRECT_PASS = "admin123"; // Cambia esta contraseña por seguridad

        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const logoutBtn = document.getElementById('logout-btn');
        const loginForm = document.getElementById('login-form');
        const articleForm = document.getElementById('article-form');

        // Validar sesión activa en sessionStorage
        if (sessionStorage.getItem('auth') === 'true') {
            showDashboard();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            if (pass === CORRECT_PASS) {
                sessionStorage.setItem('auth', 'true');
                showDashboard();
            } else {
                alert('Contraseña incorrecta');
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('auth');
            location.reload();
        });

        function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            logoutBtn.style.display = 'block';
        }

        // Manejo de Artículos
        articleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newArticle = {
                id: Date.now(),
                title: document.getElementById('art-title').value,
                summary: document.getElementById('art-summary').value,
                content: document.getElementById('art-content').value,
                date: new Date().toISOString().split('T')[0]
            };

            try {
                let response = await fetch('articulos.json');
                let articles = response.ok ? await response.json() : [];
                
                articles.unshift(newArticle); // Agregar al inicio

                // Guardar temporalmente en localStorage para persistencia local inmediata
                localStorage.setItem('cached_articles', JSON.stringify(articles));
                alert('¡Artículo guardado con éxito! Recuerda actualizar tu archivo articulos.json en el servidor.');
                articleForm.reset();
            } catch (err) {
                console.error('Error al actualizar artículos:', err);
                alert('No se pudo actualizar el archivo de artículos.');
            }
        });

        // Descargar JSON actualizado para subir al servidor/GitHub
        document.getElementById('download-json', async () => {
            let data = localStorage.getItem('cached_articles');
            if (!data) {
                let res = await fetch('articulos.json');
                data = await res.text();
            }
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'articulos.json';
            a.click();
        });
    </script>
</body>
</html>
