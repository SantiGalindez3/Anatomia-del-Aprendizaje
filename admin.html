<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Anatomía del Aprendizaje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Panel de Control</h1>
        <button id="logout-btn" style="display:none;">Cerrar Sesión</button>
    </header>

    <main class="admin-container">
        <!-- Sección de Login con contraseña medicina2026 -->
        <section id="login-section">
            <h2>Acceso Restringido</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Contraseña de administrador" required>
                <input type="password" id="github-token" placeholder="Tu Token de GitHub (ghp_...)" required>
                <button type="submit" class="btn">Ingresar al Sistema</button>
            </form>
        </section>

        <!-- Panel de Publicación -->
        <section id="dashboard-section" style="display:none;">
            <h2>Publicar Nuevo Artículo</h2>
            <form id="article-form">
                <input type="text" id="art-title" placeholder="Título del artículo" required>
                <textarea id="art-summary" placeholder="Resumen o bajada breve" required></textarea>
                <textarea id="art-content" placeholder="Contenido completo (soporta HTML)" rows="8" required></textarea>
                <button type="submit" class="btn">Guardar y Publicar en GitHub</button>
            </form>
        </section>
    </main>

    <script>
        const CORRECT_PASS = "medicina2026";
        const REPO_OWNER_AND_NAME = "santigalindez3/Anatomia-del-Aprendizaje";
        const FILE_PATH = "articulos.json";

        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const logoutBtn = document.getElementById('logout-btn');
        const loginForm = document.getElementById('login-form');
        const articleForm = document.getElementById('article-form');

        if (sessionStorage.getItem('auth') === 'true' && sessionStorage.getItem('gh_token')) {
            showDashboard();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            const tokenInput = document.getElementById('github-token').value.trim();
            
            if (pass === CORRECT_PASS && tokenInput.startsWith('ghp_')) {
                sessionStorage.setItem('auth', 'true');
                sessionStorage.setItem('gh_token', tokenInput);
                showDashboard();
            } else {
                alert('Contraseña incorrecta o Token inválido (debe iniciar con ghp_)');
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.clear();
            location.reload();
        });

        function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            logoutBtn.style.display = 'block';
        }

        articleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const GITHUB_TOKEN = sessionStorage.getItem('gh_token');
            if (!GITHUB_TOKEN) {
                alert('Sesión expirada.');
                location.reload();
                return;
            }

            const newArticle = {
                id: Date.now(),
                title: document.getElementById('art-title').value,
                summary: document.getElementById('art-summary').value,
                content: document.getElementById('art-content').value,
                date: new Date().toISOString().split('T')[0]
            };

            const submitBtn = articleForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publicando en GitHub...';

            try {
                const getUrl = `https://api.github.com/repos/${REPO_OWNER_AND_NAME}/contents/${FILE_PATH}`;
                
                // Actualizamos el formato de cabecera con Bearer y Accept para la API
                const getResponse = await fetch(getUrl, {
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!getResponse.ok) {
                    throw new Error('No se pudo conectar con el repositorio. Verifica que el token tenga permisos completos de "repo".');
                }
                
                const fileData = await getResponse.json();
                let decodedContent = [];
                try {
                    decodedContent = JSON.parse(atob(fileData.content));
                } catch (err) {
                    decodedContent = [];
                }
                
                decodedContent.unshift(newArticle);
                const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(decodedContent, null, 2))));

                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Publicación automática: ${newArticle.title}`,
                        content: updatedContentBase64,
                        sha: fileData.sha
                    })
                });

                if (putResponse.ok) {
                    alert('¡Artículo publicado con éxito! Estará visible en segundos.');
                    articleForm.reset();
                } else {
                    const errorJson = await putResponse.json();
                    throw new Error(errorJson.message || 'Error al guardar en el repositorio.');
                }
            } catch (err) {
                alert('Error al publicar: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar y Publicar en GitHub';
            }
        });
    </script>
</body>
</html>
