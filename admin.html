<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Admin · Anatomía del Aprendizaje</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .login-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 12px var(--color-shadow);
      max-width: 400px;
      margin: 60px auto;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--color-primary);
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 16px;
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #2d6b4f;
    }
    .login-error {
      color: #b33c4a;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .admin-panel {
      display: none;
    }
    .admin-panel h2 {
      color: var(--color-primary);
      margin-bottom: 20px;
    }
    .admin-panel .form-group {
      margin-bottom: 15px;
    }
    .admin-panel label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--color-text-muted);
    }
    .admin-panel input,
    .admin-panel textarea,
    .admin-panel select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .admin-panel .btn-submit {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-panel .btn-submit:hover {
      background: #2d6b4f;
    }
    .admin-panel .btn-danger {
      background: #b33c4a;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-panel .btn-danger:hover {
      background: #8a2e3a;
    }
    .admin-panel .article-item {
      background: var(--color-bg);
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--color-border);
    }
    .admin-panel .article-item .actions {
      display: flex;
      gap: 8px;
    }
    .admin-panel .article-item .actions button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .admin-panel .article-item .actions .btn-edit {
      background: #4a90d9;
      color: white;
    }
    .admin-panel .article-item .actions .btn-edit:hover {
      background: #357abd;
    }
    .admin-panel .article-item .actions .btn-delete {
      background: #b33c4a;
      color: white;
    }
    .admin-panel .article-item .actions .btn-delete:hover {
      background: #8a2e3a;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .admin-header .btn-logout {
      background: var(--color-border);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-header .btn-logout:hover {
      background: #c8d3de;
    }
    .edit-form {
      background: var(--color-bg);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      display: none;
      border: 1px solid var(--color-border);
    }
    .edit-form .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .form-container {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .sync-info {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .sync-info .status-ok {
      color: #2e7d32;
    }
    .sync-info .status-error {
      color: #b33c4a;
    }
    .sync-info .btn-refresh {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .sync-info .btn-refresh:hover {
      background: #1b5e20;
    }
    [data-theme="dark"] .sync-info {
      background: #1b3a2a;
      color: #81c784;
    }
    [data-theme="dark"] .sync-info .btn-refresh {
      background: #388e3c;
    }
    [data-theme="dark"] .sync-info .btn-refresh:hover {
      background: #2e7d32;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
    }
    @media (max-width: 768px) {
      .edit-form .form-row {
        grid-template-columns: 1fr;
      }
      .admin-panel .article-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .login-box {
        margin: 30px 20px;
        padding: 30px 20px;
      }
      .sync-info {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
    .notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--color-primary);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      font-weight: 500;
      max-width: 90%;
    }
    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }
    [data-theme="dark"] .notification {
      background: var(--color-secondary);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-brand">
        <span class="brand-icon">🔐</span>
        <span class="brand-name">Panel de Administración</span>
      </div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">← Volver al blog</a></li>
      </ul>
    </div>
  </nav>

  <div class="admin-container">
    <!-- Login -->
    <div id="loginBox" class="login-box">
      <h2>🔐 Acceso Administrativo</h2>
      <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 20px;">
        Ingresa la contraseña para gestionar el blog
      </p>
      <input type="password" id="passwordInput" placeholder="Contraseña" autofocus>
      <button onclick="verificarPassword()">Ingresar</button>
      <div id="loginError" class="login-error">❌ Contraseña incorrecta</div>
    </div>

    <!-- Panel de Administración -->
    <div id="adminPanel" class="admin-panel">
      <div class="admin-header">
        <h2>📝 Gestión de Artículos</h2>
        <button class="btn-logout" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
      </div>

      <!-- Estado de sincronización -->
      <div class="sync-info" id="syncInfo">
        <span id="syncStatus">⏳ Conectando con GitHub...</span>
        <button class="btn-refresh" onclick="cargarArticulosDesdeGitHub()">🔄 Sincronizar</button>
      </div>

      <!-- Formulario para nuevo artículo -->
      <div class="form-container">
        <h3>✏️ Publicar nuevo artículo</h3>
        <form id="adminForm">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="adminTitle" placeholder="Título del artículo" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="adminSummary" rows="3" placeholder="Resumen del artículo" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="adminCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="adminReadTime" value="5" min="1" max="30">
            </div>
          </div>
          <button type="submit" class="btn-submit">📤 Publicar artículo</button>
        </form>
      </div>

      <!-- Formulario de edición (oculto) -->
      <div id="editForm" class="edit-form">
        <h3>✏️ Editar artículo</h3>
        <form id="editArticleForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="editTitle" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="editSummary" rows="3" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="editCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="editReadTime" min="1" max="30">
            </div>
          </div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="btn-submit">💾 Guardar cambios</button>
            <button type="button" onclick="cancelarEdicion()" style="background: var(--color-border); border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer;">❌ Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Lista de artículos -->
      <h3 style="margin-top: 30px;">📋 Artículos publicados</h3>
      <div id="articleList">
        <div class="loading">⏳ Cargando artículos...</div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const ADMIN_PASSWORD = "medicina2026";
    const ARTICULOS_FILE = "articulos.json";

    let articulos = [];
    let config = null;

    // ============================================================
    // CARGAR CONFIGURACIÓN DESDE config.js
    // ============================================================

    async function cargarConfiguracion() {
      try {
        const response = await fetch('config.js');
        if (response.ok) {
          const scriptText = await response.text();
          eval(scriptText);
          config = CONFIG;
          return true;
        }
        return false;
      } catch (e) {
        console.error('❌ Error al cargar config.js:', e);
        return false;
      }
    }

    // ============================================================
    // FUNCIONES DE GITHUB
    // ============================================================

    async function cargarArticulosDesdeGitHub() {
      const statusEl = document.getElementById('syncStatus');
      const listEl = document.getElementById('articleList');
      
      statusEl.textContent = '⏳ Cargando...';
      listEl.innerHTML = '<div class="loading">⏳ Cargando artículos...</div>';

      if (!config) {
        const cargado = await cargarConfiguracion();
        if (!cargado) {
          statusEl.innerHTML = '❌ Error: No se encontró config.js';
          listEl.innerHTML = '<p style="color: #b33c4a;">⚠️ No se encontró el archivo config.js. Asegúrate de que existe en la misma carpeta.</p>';
          return;
        }
      }

      try {
        const url = `https://api.github.com/repos/${config.GITHUB_USER}/${config.GITHUB_REPO}/contents/${ARTICULOS_FILE}`;
        const response = await fetch(url, {
          headers: {
            'Authorization': `token ${config.GITHUB_TOKEN}`
          }
        });

        if (response.status === 404) {
          // Crear archivo por defecto
          statusEl.innerHTML = '📄 Creando archivo articulos.json...';
          articulos = obtenerArticulosDefault();
          await guardarArticulosEnGitHub(articulos);
          renderizarLista();
          statusEl.innerHTML = '✅ Archivo creado correctamente';
          return;
        }

        if (response.ok) {
          const data = await response.json();
          const contenido = atob(data.content);
          articulos = JSON.parse(contenido);
          renderizarLista();
          statusEl.innerHTML = `✅ ${articulos.length} artículos cargados desde GitHub`;
        } else {
          statusEl.innerHTML = '❌ Error al cargar artículos';
          listEl.innerHTML = '<p style="color: #b33c4a;">❌ Error al cargar los artículos. Verifica tu conexión y token.</p>';
        }
      } catch (error) {
        console.error('Error:', error);
        statusEl.innerHTML = '❌ Error de conexión';
        listEl.innerHTML = `<p style="color: #b33c4a;">❌ Error: ${error.message}</p>`;
      }
    }

          return false;

        // Obtener SHA actual
        const getResponse = await fetch(url, {
          headers: {
            'Authorization': `token ${config.GITHUB_TOKEN}`
          }
        });
        
        let sha = null;
        if (getResponse.ok
