<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Admin · Anatomía del Aprendizaje</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .login-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 12px var(--color-shadow);
      max-width: 400px;
      margin: 60px auto;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--color-primary);
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 16px;
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #2d6b4f;
    }
    .login-error {
      color: #b33c4a;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .admin-panel {
      display: none;
    }
    .admin-panel h2 {
      color: var(--color-primary);
      margin-bottom: 20px;
    }
    .admin-panel .form-group {
      margin-bottom: 15px;
    }
    .admin-panel label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--color-text-muted);
    }
    .admin-panel input,
    .admin-panel textarea,
    .admin-panel select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-dark);
    }
    .admin-panel .btn-submit {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-panel .btn-submit:hover {
      background: #2d6b4f;
    }
    .admin-panel .btn-danger {
      background: #b33c4a;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-panel .btn-danger:hover {
      background: #8a2e3a;
    }
    .admin-panel .article-item {
      background: var(--color-bg);
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--color-border);
    }
    .admin-panel .article-item .actions {
      display: flex;
      gap: 8px;
    }
    .admin-panel .article-item .actions button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .admin-panel .article-item .actions .btn-edit {
      background: #4a90d9;
      color: white;
    }
    .admin-panel .article-item .actions .btn-edit:hover {
      background: #357abd;
    }
    .admin-panel .article-item .actions .btn-delete {
      background: #b33c4a;
      color: white;
    }
    .admin-panel .article-item .actions .btn-delete:hover {
      background: #8a2e3a;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .admin-header .btn-logout {
      background: var(--color-border);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .admin-header .btn-logout:hover {
      background: #c8d3de;
    }
    .edit-form {
      background: var(--color-bg);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      display: none;
      border: 1px solid var(--color-border);
    }
    .edit-form .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .form-container {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .sync-info {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .sync-info .btn-export {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin: 3px;
    }
    .sync-info .btn-export:hover {
      background: #1b5e20;
    }
    [data-theme="dark"] .sync-info {
      background: #1b3a2a;
      color: #81c784;
    }
    [data-theme="dark"] .sync-info .btn-export {
      background: #388e3c;
    }
    [data-theme="dark"] .sync-info .btn-export:hover {
      background: #2e7d32;
    }
    @media (max-width: 768px) {
      .edit-form .form-row {
        grid-template-columns: 1fr;
      }
      .admin-panel .article-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .login-box {
        margin: 30px 20px;
        padding: 30px 20px;
      }
      .sync-info {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
    .notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--color-primary);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      font-weight: 500;
      max-width: 90%;
    }
    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }
    [data-theme="dark"] .notification {
      background: var(--color-secondary);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-brand">
        <span class="brand-icon">🔐</span>
        <span class="brand-name">Panel de Administración</span>
      </div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link">← Volver al blog</a></li>
      </ul>
    </div>
  </nav>

  <div class="admin-container">
    <!-- Login -->
    <div id="loginBox" class="login-box">
      <h2>🔐 Acceso Administrativo</h2>
      <p style="text-align: center; color: var(--color-text-muted); margin-bottom: 20px;">
        Ingresa la contraseña para gestionar el blog
      </p>
      <input type="password" id="passwordInput" placeholder="Contraseña" autofocus>
      <button onclick="verificarPassword()">Ingresar</button>
      <div id="loginError" class="login-error">❌ Contraseña incorrecta</div>
    </div>

    <!-- Panel de Administración -->
    <div id="adminPanel" class="admin-panel">
      <div class="admin-header">
        <h2>📝 Gestión de Artículos</h2>
        <button class="btn-logout" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
      </div>

      <!-- Información de sincronización -->
      <div class="sync-info">
        <span>💾 Los cambios se guardan en tu navegador</span>
        <div>
          <button class="btn-export" onclick="exportarArticulos()">📤 Exportar JSON</button>
          <button class="btn-export" onclick="importarArticulos()">📥 Importar JSON</button>
          <button class="btn-export" onclick="subirAGitHub()" style="background: #1a73e8;">⬆️ Subir a GitHub</button>
        </div>
      </div>

      <!-- Formulario para nuevo artículo -->
      <div class="form-container">
        <h3>✏️ Publicar nuevo artículo</h3>
        <form id="adminForm">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="adminTitle" placeholder="Título del artículo" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="adminSummary" rows="3" placeholder="Resumen del artículo" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="adminCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="adminReadTime" value="5" min="1" max="30">
            </div>
          </div>
          <button type="submit" class="btn-submit">📤 Publicar artículo</button>
        </form>
      </div>

      <!-- Formulario de edición (oculto) -->
      <div id="editForm" class="edit-form">
        <h3>✏️ Editar artículo</h3>
        <form id="editArticleForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="editTitle" required>
          </div>
          <div class="form-group">
            <label>Resumen</label>
            <textarea id="editSummary" rows="3" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="editCategory">
                <option value="Clínica">Clínica</option>
                <option value="Neuro">Neuro</option>
                <option value="Nota al margen">Notas al Margen</option>
                <option value="Investigación">Investigación</option>
                <option value="Recursos">Recursos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tiempo de lectura (min)</label>
              <input type="number" id="editReadTime" min="1" max="30">
            </div>
          </div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="btn-submit">💾 Guardar cambios</button>
            <button type="button" onclick="cancelarEdicion()" style="background: var(--color-border); border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer;">❌ Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Lista de artículos -->
      <h3 style="margin-top: 30px;">📋 Artículos publicados</h3>
      <div id="articleList"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const ADMIN_PASSWORD = "medicina2026";

    let articulos = [];

    // ============================================================
    // FUNCIONES DE ALMACENAMIENTO LOCAL
    // ============================================================

    function obtenerArticulosDefault() {
      return [
        {
          id: 1,
          titulo: "Bienvenido a Anatomía del Aprendizaje",
          resumen: "Este es tu blog médico. Desde el panel de administración podrás crear, editar y eliminar artículos.",
          categoria: "Clínica",
          fecha: new Date().toISOString().split('T')[0],
          tiempoLectura: 2,
          destacado: true
        },
        {
          id: 2,
          titulo: "Ejemplo de artículo médico",
          resumen: "Este es un artículo de ejemplo. Puedes editarlo o eliminarlo desde el panel de administración.",
          categoria: "Neuro",
          fecha: new Date().toISOString().split('T')[0],
          tiempoLectura: 3,
          destacado: false
        }
      ];
    }

    function cargarArticulos() {
      const guardados = localStorage.getItem('articulos');
      if (guardados) {
        try {
          articulos = JSON.parse(guardados);
          if (!Array.isArray(articulos) || articulos.length === 0) {
            articulos = obtenerArticulosDefault();
          }
        } catch (e) {
          articulos = obtenerArticulosDefault();
        }
      } else {
        articulos = obtenerArticulosDefault();
      }
      renderizarLista();
    }

    function guardarArticulos() {
      localStorage.setItem('articulos', JSON.stringify(articulos));
      mostrarNotificacion('✅ Artículos guardados localmente');
    }

    // ============================================================
    // FUNCIONES DEL ADMIN
    // ============================================================

    function verificarPassword() {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('loginError');
      
      if (input.value === ADMIN_PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        error.style.display = 'none';
        cargarArticulos();
      } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
      }
    }

    function cerrarSesion() {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    function renderizarLista() {
      const list = document.getElementById('articleList');
      if (!articulos || articulos.length === 0) {
        list.innerHTML = '<p style="color: var(--color-text-muted);">No hay artículos publicados.</p>';
        return;
      }

      let html = '';
      articulos.forEach(a => {
        html += `
          <div class="article-item">
            <div>
              <strong>${a.titulo}</strong>
              <br>
              <span style="font-size: 0.85rem; color: var(--color-text-muted);">
                ${a.categoria} · ${a.fecha} · ${a.tiempoLectura} min
              </span>
            </div>
            <div class="actions">
              <button class="btn-edit" onclick="editarArticulo(${a.id})">✏️</button>
              <button class="btn-delete" onclick="eliminarArticulo(${a.id})">🗑️</button>
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    function eliminarArticulo(id) {
      if (confirm('¿Estás seguro de eliminar este artículo?')) {
        articulos = articulos.filter(a => a.id !== id);
        guardarArticulos();
        renderizarLista();
        mostrarNotificacion('🗑️ Artículo eliminado');
      }
    }

    function editarArticulo(id) {
      const articulo = articulos.find(a => a.id === id);
      if (!articulo) return;

      document.getElementById('editId').value = articulo.id;
      document.getElementById('editTitle').value = articulo.titulo;
      document.getElementById('editSummary').value = articulo.resumen;
      document.getElementById('editCategory').value = articulo.categoria;
      document.getElementById('editReadTime').value = articulo.tiempoLectura;
      
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('editForm').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelarEdicion() {
      document.getElementById('editForm').style.display = 'none';
    }

    function mostrarNotificacion(mensaje) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = mensaje;
      document.body.appendChild(notif);
      setTimeout(() => notif.classList.add('show'), 10);
      setTimeout(() => {
        notif.classList.remove('show');
        setTimeout(() => notif.remove(), 300);
      }, 3000);
    }

    // ============================================================
    // EXPORTAR E IMPORTAR ARTÍCULOS
    // ============================================================

    function exportarArticulos() {
      const data = JSON.stringify(articulos, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `articulos_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      mostrarNotificacion('📦 Artículos exportados');
    }

    function importarArticulos() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
          try {
            const imported = JSON.parse(event.target.result);
            if (Array.isArray(imported) && imported.length > 0) {
              if (confirm('¿Estás seguro de importar estos artículos? Se reemplazarán los actuales.')) {
                articulos = imported;
                guardarArticulos();
                renderizarLista();
                mostrarNotificacion('✅ Artículos importados correctamente');
              }
            } else {
              alert('El archivo no contiene artículos válidos.');
            }
          } catch (error) {
            alert('Error al leer el archivo: ' + error.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ============================================================
    // SUBIR A GITHUB (MÉTODO MANUAL CON INSTRUCCIONES)
    // ============================================================

    function subirAGitHub() {
      const data = JSON.stringify(articulos, null, 2);
      
      // Crear el archivo para descargar
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      // Instrucciones detalladas
      const instrucciones = `
📋 INSTRUCCIONES PARA PUBLICAR CAMBIOS EN GITHUB:

1️⃣ Descarga el archivo "articulos.json" que se generará

2️⃣ Ve a tu repositorio en GitHub:
   https://github.com/SantiGalindez3/Anatomia-del-Aprendizaje

3️⃣ Haz clic en el archivo "articulos.json"

4️⃣ Haz clic en el lápiz (✏️) para editar

5️⃣ Copia TODO el contenido del archivo descargado

6️⃣ Pega el contenido en el editor de GitHub

7️⃣ Haz clic en "Commit changes"

8️⃣ Escribe un mensaje: "Actualización de artículos"

9️⃣ ¡Los cambios serán visibles para todos los visitantes!

⚠️ NOTA: Este es el método manual. Es seguro y no requiere tokens.
      `;

      alert(instrucciones);
      
      // Descargar el archivo
      const a = document.createElement('a');
      a.href = url;
      a.download = 'articulos.json';
      a.click();
      URL.revokeObjectURL(url);
      
      mostrarNotificacion('📄 Archivo generado. Sigue las instrucciones.');
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verificarPassword();
    });

    // Nuevo artículo
    document.getElementById('adminForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const titulo = document.getElementById('adminTitle').value.trim();
      const resumen = document.getElementById('adminSummary').value.trim();
      const categoria = document.getElementById('adminCategory').value;
      const tiempoLectura = parseInt(document.getElementById('adminReadTime').value);

      if (!titulo || !resumen) {
        alert('Completa todos los campos obligatorios.');
        return;
      }

      const nuevo = {
        id: Date.now(),
        titulo,
        resumen,
        categoria,
        fecha: new Date().toISOString().split('T')[0],
        tiempoLectura,
        destacado: false
      };

      articulos.push(nuevo);
      guardarArticulos();
      renderizarLista();
      this.reset();
      mostrarNotificacion('✅ Artículo publicado correctamente');
    });

    // Editar artículo
    document.getElementById('editArticleForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const id = parseInt(document.getElementById('editId').value);
      const titulo = document.getElementById('editTitle').value.trim();
      const resumen = document.getElementById('editSummary').value.trim();
      const categoria = document.getElementById('editCategory').value;
      const tiempoLectura = parseInt(document.getElementById('editReadTime').value);

      if (!titulo || !resumen) {
        alert('Completa todos los campos.');
        return;
      }

      const index = articulos.findIndex(a => a.id === id);
      if (index !== -1) {
        articulos[index] = { ...articulos[index], titulo, resumen, categoria, tiempoLectura };
        guardarArticulos();
        renderizarLista();
        document.getElementById('editForm').style.display = 'none';
        mostrarNotificacion('✅ Artículo actualizado');
      }
    });

    // Tema oscuro
    let currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================

    console.log('🔐 Panel de administración cargado (modo local)');
    console.log('📝 Los artículos se guardan en localStorage');
    console.log('📤 Usa "Subir a GitHub" para publicar cambios');
  </script>

</body>
</html>
