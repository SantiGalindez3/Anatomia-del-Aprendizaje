<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Lado C</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Gestión de Contenido</h1>
        <button id="logout-btn" style="display:none;">Cerrar Sesión</button>
    </header>

    <main class="admin-container">
        <!-- Sección de Login -->
        <section id="login-section">
            <h2>Acceso de Administrador</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Contraseña de acceso" required>
                <input type="password" id="github-token" placeholder="Tu Token de GitHub (ghp_...)" required>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </section>

        <!-- Panel Principal -->
        <section id="dashboard-section" style="display:none;">
            <h2>Nuevo Artículo / Nota</h2>
            <form id="article-form">
                <input type="text" id="art-title" placeholder="Título del artículo" required>
                <textarea id="art-summary" placeholder="Breve resumen o bajada" required></textarea>
                <textarea id="art-content" placeholder="Contenido completo en formato HTML o texto" rows="10" required></textarea>
                <button type="submit" class="btn">Guardar y Publicar en GitHub</button>
            </form>
        </section>
    </main>

    <script>
        const CORRECT_PASS = "admin123"; // Contraseña de acceso al panel
        const REPO_OWNER_AND_NAME = "santigalindez3/Anatomia-del-Aprendizaje"; // Tu repositorio actualizado
        const FILE_PATH = "articulos.json";

        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const logoutBtn = document.getElementById('logout-btn');
        const loginForm = document.getElementById('login-form');
        const articleForm = document.getElementById('article-form');

        // Verificar si ya hay una sesión activa con el token guardado
        if (sessionStorage.getItem('auth') === 'true' && sessionStorage.getItem('gh_token')) {
            showDashboard();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            const tokenInput = document.getElementById('github-token').value.trim();
            
            if (pass === CORRECT_PASS && tokenInput.startsWith('ghp_')) {
                sessionStorage.setItem('auth', 'true');
                sessionStorage.setItem('gh_token', tokenInput);
                showDashboard();
            } else {
                alert('Contraseña incorrecta o formato de Token inválido (debe empezar con ghp_)');
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.clear();
            location.reload();
        });

        function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            logoutBtn.style.display = 'block';
        }

        // Lógica de guardado y commit automático mediante GitHub API
        articleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const GITHUB_TOKEN = sessionStorage.getItem('gh_token');
            if (!GITHUB_TOKEN) {
                alert('Sesión expirada. Por favor, vuelve a iniciar sesión.');
                location.reload();
                return;
            }

            const newArticle = {
                id: Date.now(),
                title: document.getElementById('art-title').value,
                summary: document.getElementById('art-summary').value,
                content: document.getElementById('art-content').value,
                date: new Date().toISOString().split('T')[0]
            };

            const submitBtn = articleForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publicando...';

            try {
                // 1. Obtener el archivo actual de GitHub para conseguir su SHA
                const getUrl = `https://api.github.com/repos/${REPO_OWNER_AND_NAME}/contents/${FILE_PATH}`;
                const getResponse = await fetch(getUrl, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });

                if (!getResponse.ok) throw new Error('No se pudo conectar con el repositorio. Revisa tu token.');
                
                const fileData = await getResponse.json();
                const sha = fileData.sha;
                
                // Decodificar el contenido actual y agregar el nuevo artículo al inicio
                let decodedContent = [];
                try {
                    decodedContent = JSON.parse(atob(fileData.content));
                } catch (err) {
                    decodedContent = [];
                }
                decodedContent.unshift(newArticle);

                // Codificar de nuevo a Base64
                const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(decodedContent, null, 2))));

                // 2. Enviar el commit con la actualización del archivo
                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Actualización automática de artículo: ${newArticle.title}`,
                        content: updatedContentBase64,
                        sha: sha
                    })
                });

                if (putResponse.ok) {
                    alert('¡Artículo publicado con éxito! Los cambios se reflejarán en tu web en unos segundos.');
                    articleForm.reset();
                } else {
                    throw new Error('Error al guardar los cambios en GitHub. Verifica los permisos de tu token.');
                }

            } catch (err) {
                console.error(err);
                alert('Ocurrió un error al intentar publicar: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar y Publicar en GitHub';
            }
        });
    </script>
</body>
</html>
